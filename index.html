<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Friend - TX</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  overflow-x:hidden;
}

h1 {
  color: #333;
  margin-bottom: 20px;
  animation: slideIn 1s ease forwards;
}

.card {
  display:none;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
  text-align:center;
  max-width:380px;
  animation: fadeInUp 0.6s ease forwards;
  position:relative;
}

input {
  width:80%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  transition: all 0.3s;
}
input:focus {
  border-color: #ff6f61;
  box-shadow:0 0 10px rgba(255,111,97,0.5);
  outline:none;
}

button {
  padding:10px 20px;
  margin:8px 5px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  transition: all 0.3s;
}
button:hover {
  transform: scale(1.1);
  box-shadow:0 0 15px rgba(255,111,97,0.6);
}

.btn-main { background:#ff6f61; color:white; }
.btn-yes { background:#4CAF50; color:white; }
.btn-no { background:#f44336; color:white; }
.btn-logout { background:#333; color:white; }

canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:999;
}

@keyframes fadeInUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes slideIn {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<h1>Welcome 👋 to TX's World</h1>

<!-- STEP 1 -->
<div class="card" id="popup">
  <p>Hi fam! What's your nickname and phone number?</p>
  <input type="text" id="nickname" placeholder="Your nickname"><br>
  <input type="text" id="phone" placeholder="Phone number"><br>
  <p class="error" id="errorMsg" style="color:red; display:none;">Enter valid details!</p>
  <button class="btn-main" onclick="submitForm()">Submit</button>
</div>

<!-- STEP 2 -->
<div class="card" id="welcome">
  <h2 id="welcomeText"></h2>
  <button class="btn-main" onclick="nextStep()">Continue</button>
</div>

<!-- STEP 3 -->
<div class="card" id="question">
  <p><b>Hi fam! My name is TX 🤗</b></p>
  <p>Will you like to be my friend?</p>
  <button class="btn-yes" onclick="answerYes()">Yes 💖</button>
  <button class="btn-no" onclick="answerNo()">No 💔</button>
</div>

<!-- FINAL MESSAGE -->
<div class="card" id="finalMessage">
  <h2 id="finalText"></h2>
  <button class="btn-logout" onclick="logout()">Logout 🔄</button>
</div>

<button class="btn-main" id="openBtn" onclick="openPopup()">Click me!</button>

<script>
// Elements
const popup = document.getElementById('popup');
const welcome = document.getElementById('welcome');
const question = document.getElementById('question');
const finalMessage = document.getElementById('finalMessage');
const welcomeText = document.getElementById('welcomeText');
const finalText = document.getElementById('finalText');
const openBtn = document.getElementById('openBtn');
const errorMsg = document.getElementById('errorMsg');
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Confetti
let confettiParticles = [];

function createConfetti() {
  for(let i=0;i<150;i++){
    confettiParticles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*7+3,
      speedY: Math.random()*3+1,
      speedX: (Math.random()-0.5)*2,
      color: `hsl(${Math.random()*360}, 70%, 60%)`,
      tilt: Math.random()*10
    });
  }
}

function drawConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x+p.tilt, p.y+p.size);
    ctx.lineTo(p.x, p.y+p.size);
    ctx.closePath();
    ctx.fill();

    p.y += p.speedY;
    p.x += p.speedX;
    if(p.y>canvas.height){p.y=0; p.x=Math.random()*canvas.width;}
    if(p.x>canvas.width)p.x=0;
    if(p.x<0)p.x=canvas.width;
  });
  requestAnimationFrame(drawConfetti);
}

function startConfetti(){
  confettiParticles = [];
  createConfetti();
  drawConfetti();
}

// Functions
function openPopup(){
  popup.style.display='block';
  openBtn.style.display='none';
}

function submitForm(){
  const name = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if(name === '' || phone === '' || phone.length<10 || isNaN(phone)){
    errorMsg.style.display='block';
    return;
  }

  localStorage.setItem("txUser", JSON.stringify({name, phone}));

  errorMsg.style.display='none';
  popup.style.display='none';
  welcome.style.display='block';
  welcomeText.innerText = `Welcome ${name}! 🎉 Your phone ${phone} is noted.`;
}

function nextStep(){
  welcome.style.display='none';
  question.style.display='block';
}

function answerYes(){
  question.style.display='none';
  finalMessage.style.display='block';
  finalText.innerText = "Awww 🥰 TX is thrilled! Welcome to my friendship world 💖🎉";
  startConfetti();
}

function answerNo(){
  question.style.display='none';
  finalMessage.style.display='block';
  finalText.innerText = "😢 TX is sad, but still wishes you happiness 💔";
}

function logout(){
  localStorage.removeItem("txUser");
  finalMessage.style.display='none';
  popup.style.display='block';
  document.getElementById('nickname').value='';
  document.getElementById('phone').value='';
  openBtn.style.display='none';
}

// Auto load if user exists
window.onload = function(){
  const user = localStorage.getItem("txUser");
  if(user){
    const u = JSON.parse(user);
    welcomeText.innerText = `Welcome back ${u.name}! 🎉 Your phone ${u.phone} is noted.`;
    welcome.style.display='block';
  }
}
</script>

</body>
</html>
