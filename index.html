<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Friend</title>

<style>
body {
  font-family: Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
  background: linear-gradient(to right, #ffecd2, #fcb69f);
}

.card {
  display:none;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
  animation:fadeIn .5s;
}

button {
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-main { background:#ff6f61; color:white; }
.btn-yes { background:green; color:white; }
.btn-no { background:red; color:white; }

canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}

@keyframes fadeIn {
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<h2>Welcome 👋</h2>

<div class="card" id="popup">
  <p>Nickname & phone</p>
  <input id="name" placeholder="Name"><br>
  <input id="phone" placeholder="Phone"><br>
  <button class="btn-main" onclick="saveUser()">Submit</button>
</div>

<div class="card" id="question">
  <p>Hi fam! I'm TX 🤗</p>
  <p>Will you be my friend?</p>
  <button class="btn-yes" onclick="yes()">Yes 💖</button>
  <button class="btn-no" onclick="no()">No 💔</button>
</div>

<div class="card" id="result">
  <h3 id="msg"></h3>
</div>

<button class="btn-main" id="startBtn" onclick="start()">Start</button>

<audio id="soundYes" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const popup = document.getElementById("popup");
const question = document.getElementById("question");
const result = document.getElementById("result");
const msg = document.getElementById("msg");

function start(){
  let user = localStorage.getItem("user");
  if(user){
    question.style.display="block";
  }else{
    popup.style.display="block";
  }
  document.getElementById("startBtn").style.display="none";
}

function saveUser(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(name=="" || phone.length<10) return alert("Invalid");

  localStorage.setItem("user", JSON.stringify({name, phone}));

  popup.style.display="none";
  question.style.display="block";
}

function yes(){
  document.getElementById("soundYes").play();
  question.style.display="none";
  result.style.display="block";
  msg.innerText="🥰 TX is so happy! Welcome friend 🎉";

  launchConfetti();
}

function no(){
  question.style.display="none";
  result.style.display="block";
  msg.innerText="😢 TX is sad... but still wishes you happiness 💔";
}

/* SIMPLE CONFETTI */
function launchConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for(let i=0;i<100;i++){
    pieces.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*5+2,
      speed: Math.random()*3+1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.fillRect(p.x,p.y,p.size,p.size);
      p.y += p.speed;
      if(p.y>canvas.height) p.y=0;
    });
    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
