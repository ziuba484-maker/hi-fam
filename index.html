<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Friend</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
    }
    .popup, .welcome {
      display: none;
      padding: 25px 30px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      text-align: center;
      max-width: 350px;
      animation: fadeIn 0.8s ease forwards;
    }
    .popup input {
      width: 80%;
      padding: 8px 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .popup button {
      padding: 10px 20px;
      background: #ff6f61;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .popup button:hover {
      background: #e65b50;
    }
    @keyframes fadeIn {
      0% {opacity: 0; transform: translateY(-20px);}
      100% {opacity: 1; transform: translateY(0);}
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Welcome 👋</h1>

  <!-- Initial popup to enter nickname and phone -->
  <div class="popup" id="popup">
    <p>Hi fam! What's your nickname and phone number?</p>
    <input type="text" id="nickname" placeholder="Your nickname">
    <input type="text" id="phone" placeholder="Phone number">
    <button onclick="submitForm()">Submit</button>
  </div>

  <!-- Welcome message -->
  <div class="welcome" id="welcome">
    <h2 id="welcomeText"></h2>
    <p>🌸🌸🎉🎉</p>
  </div>

  <button id="openBtn" onclick="openPopup()">Click me!</button>

  <script>
    const popup = document.getElementById('popup');
    const welcome = document.getElementById('welcome');
    const welcomeText = document.getElementById('welcomeText');
    const openBtn = document.getElementById('openBtn');

    function openPopup() {
      popup.style.display = 'block';
      openBtn.style.display = 'none';
    }

    function submitForm() {
      const name = document.getElementById('nickname').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if(name === '' || phone === '') {
        alert("Please fill both fields!");
        return;
      }
      popup.style.display = 'none';
      welcomeText.innerText = `Welcome ${name}! 🎉 Your phone ${phone} is noted.`;
      welcome.style.display = 'block';
    }
  </script>

</body>
</html>
